<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Assistant | Premium Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-zoho: #0ea5e9;
            --accent-sap: #8b5cf6;
            --text: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --border: #e2e8f0;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 30px;
            overflow-x: hidden;
        }
        .nav-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--accent-zoho); }
        
        .platform-switch { display: flex; gap: 10px; }
        .btn { 
            padding: 8px 20px; border-radius: 12px; border: 1px solid var(--border);
            background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit;
            transition: all 0.3s ease;
        }
        .btn.active-zoho { background: var(--accent-zoho); color: white; font-weight: 600; border-color: var(--accent-zoho); }
        .btn.active-sap { background: var(--accent-sap); color: white; font-weight: 600; border-color: var(--accent-sap); }

        .dashboard-grid { 
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; 
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 24px; position: relative; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .span-4 { grid-column: span 4; }
        .span-8 { grid-column: span 8; }
        .span-12 { grid-column: span 12; }

        .metric { display: flex; flex-direction: column; }
        .metric-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .metric-value { font-size: 2.5rem; font-weight: 700; margin: 5px 0; color: var(--text); }
        .metric-trend { font-size: 0.8rem; color: var(--success); display: flex; align-items: center; gap: 4px; }

        h3 { font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; color: var(--text); }

        .ai-pulse {
            position: absolute; top: 20px; right: 20px; width: 8px; height: 8px;
            background: var(--success); border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; scale: 1; } 50% { opacity: 1; scale: 1.4; } 100% { opacity: 0.4; scale: 1; } }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 16px 12px; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
        .status-pill { 
            padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700;
            background: #f1f5f9; text-transform: uppercase;
        }
        .status-open { color: var(--accent-zoho); }
        .status-inprogress { color: #d97706; }
        .status-closed { color: var(--success); }

        /* Chart Styling */
        .chart-container { height: 250px; width: 100%; }

        /* Action Center Styling */
        .action-center {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .action-group {
            display: flex; flex-direction: column; gap: 15px;
        }
        select, input {
            background: #f8fafc;
            border: 1px solid var(--border);
            color: var(--text); padding: 10px; border-radius: 12px;
            font-family: inherit; width: 100%;
        }
        .btn-update {
            background: var(--accent-zoho); color: white;
            border: none; padding: 12px; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-update:hover { background: #0284c7; transform: translateY(-2px); }
        .span-12.action-card { margin-top: 20px; }
        
        .logout-btn {
            font-size: 0.8rem; color: #ef4444; cursor: pointer; text-decoration: underline; margin-left: 20px;
        }

        /* Search Styling */
        .search-container {
            flex: 1; margin: 0 30px; display: flex; gap: 10px; position: relative;
        }
        #ai-search-input {
            flex: 1; background: #f1f5f9; border: 1px solid var(--border);
            border-radius: 12px; padding: 10px 20px; font-family: inherit;
        }
        .btn-search {
            background: var(--accent-zoho); color: white; border: none;
            border-radius: 12px; padding: 10px 20px; font-weight: 600; cursor: pointer;
        }
        .search-result-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .search-result-modal {
            background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
    </style>
    <script>
        if (localStorage.getItem('userAuth') !== 'true') {
            window.location.href = 'login.html';
        }
        function logout() {
            localStorage.removeItem('userAuth');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="nav-header">
        <div class="logo"><span>Intelligence</span> Assistant <span style="font-size: 0.6rem; background: var(--accent-zoho); color: white; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 10px;">V2.0 ACTIVE</span></div>
        
        <div class="search-container">
            <input type="text" id="ai-search-input" placeholder="Ask AI: 'list tasks', 'team utilization'..." onkeypress="if(event.key==='Enter')handleAISearch()">
            <button class="btn-search" onclick="handleAISearch()">Query AI</button>
        </div>

        <div class="platform-switch" id="platform-switch">
            <button class="btn active-zoho" onclick="switchPlatform('zoho')">Zoho Projects</button>
            <button class="btn" onclick="switchPlatform('sap')">SAP S/4HANA</button>
            <span class="logout-btn" onclick="logout()">Logout</span>
        </div>
    </div>

    <div class="search-result-overlay" id="search-overlay" onclick="closeSearch()">
        <div class="search-result-modal" onclick="event.stopPropagation()">
            <h3 id="search-title">AI Query Result</h3>
            <p id="search-message" style="margin-bottom: 20px; color: var(--text-muted);"></p>
            <div id="search-data" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn-update" style="margin-top: 20px; width: 100%;" onclick="closeSearch()">Close Result</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- Action Center (TOP PRIORITY) -->
        <div class="card span-12 action-card" style="border: 1px solid var(--accent-zoho);">
            <h3 style="color: var(--accent-zoho);">⚡ AI Action Intelligence Center (Interactive)</h3>
            <div class="action-center">
                <div class="action-group">
                    <label style="font-size: 0.8rem; opacity: 0.6;">Update Task Status</label>
                    <select id="task-select-status">
                        <!-- Dynamic -->
                    </select>
                    <select id="status-select">
                        <option value="open">Open</option>
                        <option value="inprogress">In Progress</option>
                        <option value="testing">Testing</option>
                        <option value="closed">Closed</option>
                    </select>
                    <button class="btn-update" onclick="updateStatus()">Update Task Status</button>
                </div>
                <div class="action-group">
                    <label style="font-size: 0.8rem; opacity: 0.6;">Reassign Resource</label>
                    <select id="task-select-assign">
                        <!-- Dynamic -->
                    </select>
                    <select id="user-select">
                        <option value="u1">Bob Martinez (Engineering)</option>
                        <option value="u2">Alice Johnson (Design)</option>
                        <option value="u3">David Lee (QA)</option>
                    </select>
                    <button class="btn-update" style="background: var(--accent-sap); color: white;" onclick="assignTask()">Assign New Owner</button>
                </div>
            </div>
        </div>
        <!-- Metrics -->
        <div class="card span-4">
            <div class="ai-pulse"></div>
            <div class="metric">
                <span class="metric-label">Active Workstreams</span>
                <span class="metric-value" id="val-projects">--</span>
                <span class="metric-trend">↑ 12% from last week</span>
            </div>
        </div>
        <div class="card span-4">
            <div class="metric">
                <span class="metric-label">Pending Actions</span>
                <span class="metric-value" id="val-tasks">--</span>
                <span class="metric-trend">AI Priority: High</span>
            </div>
        </div>
        <div class="card span-4">
            <div class="metric">
                <span class="metric-label">System Health</span>
                <span class="metric-value" style="color: var(--success)">Optimal</span>
                <span class="metric-trend">All integrations active</span>
            </div>
        </div>

        <!-- Charts -->
        <div class="card span-8">
            <h3 id="chart-title">Integration Velocity</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        <div class="card span-4">
            <h3>Resource Allocation</h3>
            <div class="chart-container">
                <canvas id="resourceChart"></canvas>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card span-12">
            <h3 id="table-title">Critical Path Analysis</h3>
            <table id="data-table">
                <thead>
                    <tr id="table-head">
                        <!-- Dynamic -->
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentPlatform = 'zoho';
        let rawData = null;
        let mainChart = null;
        let resourceChart = null;

        async function init() {
            const res = await fetch('/api/dashboard');
            rawData = await res.json();
            render();
        }

        function switchPlatform(p) {
            currentPlatform = p;
            const btns = document.querySelectorAll('.platform-switch .btn');
            btns[0].className = p === 'zoho' ? 'btn active-zoho' : 'btn';
            btns[1].className = p === 'sap' ? 'btn active-sap' : 'btn';
            render();
        }

        function render() {
            if (!rawData) return;
            
            const data = currentPlatform === 'zoho' ? rawData.projects : rawData.sapProjects;
            const tasks = currentPlatform === 'zoho' ? rawData.tasks : [];

            document.getElementById('val-projects').innerText = data.length;
            document.getElementById('val-tasks').innerText = currentPlatform === 'zoho' ? rawData.tasks.length : '--';
            document.getElementById('chart-title').innerText = currentPlatform === 'zoho' ? 'Zoho Project Progression' : 'SAP ERP Instance Status';
            document.getElementById('table-title').innerText = currentPlatform === 'zoho' ? 'Active Project Tracks' : 'SAP S/4HANA Module Sync';

            // Project Chart (mock values for visualization)
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: data.map(i => i.name),
                    datasets: [{
                        label: 'Completion %',
                        data: data.map(i => i.percent_complete || (i.status === 'In-Progress' ? 45 : 10)),
                        backgroundColor: currentPlatform === 'zoho' ? '#38bdf8' : '#a855f7',
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    onClick: (evt, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const projectName = data[index].name;
                            filterTable(projectName);
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => `Progress: ${ctx.raw}% (Click to Filter)` } }
                    },
                    scales: { 
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });

            // Resource Chart
            if (resourceChart) resourceChart.destroy();
            resourceChart = new Chart(document.getElementById('resourceChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: rawData.teamUtilization.map(u => u.team),
                    datasets: [{
                        data: rawData.teamUtilization.map(u => u.avgUtilization),
                        backgroundColor: ['#38bdf8', '#818cf8', '#fb7185', '#a855f7'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.7)', font: { size: 10 } } } },
                    cutout: '70%'
                }
            });

            // Initial Table Render
            renderTable(data);

            // Update Action Center Pickers
            const taskSelectStatus = document.getElementById('task-select-status');
            const taskSelectAssign = document.getElementById('task-select-assign');
            
            if (currentPlatform === 'zoho') {
                const options = rawData.tasks.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                taskSelectStatus.innerHTML = options;
                taskSelectAssign.innerHTML = options;
            } else {
                const options = rawData.sapProjects.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                taskSelectStatus.innerHTML = options;
                taskSelectAssign.innerHTML = options;
            }
        }

        function filterTable(name) {
            const data = currentPlatform === 'zoho' ? rawData.projects : rawData.sapProjects;
            const filtered = data.filter(p => p.name === name);
            renderTable(filtered, true);
        }

        function renderTable(displayData, isFiltered = false) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            if (isFiltered) {
                document.getElementById('table-title').innerHTML = `${currentPlatform === 'zoho' ? 'Project' : 'SAP Module'} Detail: <span style="color: var(${currentPlatform === 'zoho' ? '--accent-zoho' : '--accent-sap'})">${displayData[0].name}</span> <button onclick="render()" style="font-size: 0.7rem; background: none; border: 1px solid var(--border); color: var(--text); padding: 2px 8px; border-radius: 4px; margin-left: 10px; cursor: pointer;">Reset View</button>`;
            } else {
                document.getElementById('table-title').innerText = currentPlatform === 'zoho' ? 'Active Project Tracks' : 'SAP S/4HANA Module Sync';
            }

            if (currentPlatform === 'zoho') {
                head.innerHTML = '<th>PROJECT TRACK</th><th>OWNER</th><th>TIMELINE</th><th>STATUS</th>';
                displayData.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 600">${p.name}</td>
                        <td style="opacity: 0.7">${p.owner_name}</td>
                        <td style="font-family: monospace; font-size: 0.8rem">${p.start_date} → ${p.end_date}</td>
                        <td><span class="status-pill status-${p.status}">${p.status}</span></td>
                    `;
                    body.appendChild(tr);
                });
            } else {
                head.innerHTML = '<th>SAP MODULE</th><th>OWNER</th><th>TIMELINE</th><th>STATUS</th>';
                displayData.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 600">${p.name}</td>
                        <td style="opacity: 0.7">${p.owner_name}</td>
                        <td style="font-family: monospace; font-size: 0.8rem">${p.start_date} → ${p.end_date}</td>
                        <td><span class="status-pill status-closed">${p.status}</span></td>
                    `;
                    body.appendChild(tr);
                });
            }
        }

        async function updateStatus() {
            const taskId = document.getElementById('task-select-status').value;
            const status = document.getElementById('status-select').value;
            
            const res = await fetch('/api/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId, status })
            });
            
            if (res.ok) {
                alert('✅ Status updated successfully!');
                init(); // Refresh data
            }
        }

        async function assignTask() {
            const taskId = document.getElementById('task-select-assign').value;
            const assigneeId = document.getElementById('user-select').value;
            
            const res = await fetch('/api/assign-task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId, assigneeId })
            });
            
            if (res.ok) {
                alert('👤 Resource assigned successfully!');
                init(); // Refresh data
            }
        }

        async function handleAISearch() {
            const query = document.getElementById('ai-search-input').value;
            if (!query) return;

            const btn = document.querySelector('.btn-search');
            btn.innerText = 'Consulting AI...';
            btn.disabled = true;

            const res = await fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            
            const result = await res.json();
            btn.innerText = 'Query AI';
            btn.disabled = false;

            if (result.success) {
                document.getElementById('search-overlay').style.display = 'flex';
                document.getElementById('search-message').innerText = result.message;
                
                const dataDiv = document.getElementById('search-data');
                dataDiv.innerHTML = '';

                if (result.data && Array.isArray(result.data)) {
                    const table = document.createElement('table');
                    table.innerHTML = `<thead><tr><th>Attribute</th><th>Value</th></tr></thead><tbody></tbody>`;
                    const tbody = table.querySelector('tbody');
                    
                    result.data.slice(0, 5).forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${item.name || item.team || item.id}</td><td>${item.status || item.avgUtilization + '%' || 'Active'}</td>`;
                        tbody.appendChild(tr);
                    });
                    dataDiv.appendChild(table);
                } else {
                    dataDiv.innerHTML = `<p style="text-align: center; opacity: 0.5;">Detailed data available in standard dashboard views.</p>`;
                }
            }
        }

        function closeSearch() {
            document.getElementById('search-overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
