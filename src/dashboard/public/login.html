<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Intelligent Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f5f9;
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .header p { color: #64748b; font-size: 0.9rem; }
        .header span { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px;
            font-family: inherit; font-size: 1rem; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        
        .btn-login {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background: #0ea5e9; transform: translateY(-2px); }

        .mock-note { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <h1><span>Intelligent</span> Assistant</h1>
            <p>Enter your credentials to access the dashboard</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="demo@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" value="password123" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <p class="mock-note">Demo Mode: Any credentials will work.</p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('userAuth', 'true');
            window.location.href = 'index.html';
        }

        // Check if already logged in
        if (localStorage.getItem('userAuth') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
